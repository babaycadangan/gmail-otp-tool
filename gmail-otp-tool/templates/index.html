<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail OTP Extractor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        .navbar {
            background: #161b22 !important;
            border-bottom: 1px solid #30363d;
        }
        .navbar-brand {
            color: #00d4aa !important;
            font-weight: 700;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .card-header {
            background: transparent;
            border-bottom: 1px solid #30363d;
            font-weight: 600;
        }
        .card-body { padding: 20px; }
        .form-control, .form-select {
            background: #21262d;
            border: 1px solid #30363d;
            color: #e6edf3;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            background: #21262d;
            border-color: #00d4aa;
            color: #e6edf3;
            box-shadow: 0 0 0 0.2rem rgba(0,212,170,0.15);
        }
        .form-label {
            font-size: 0.85rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .btn-success {
            background: #00d4aa;
            border: none;
            color: #000;
            font-weight: 600;
            border-radius: 8px;
        }
        .btn-success:hover {
            background: #00b894;
            transform: translateY(-1px);
        }
        .btn-success:disabled {
            background: #2ea043;
            opacity: 0.5;
        }
        .btn-outline-secondary {
            border-color: #30363d;
            color: #e6edf3;
        }
        .btn-outline-secondary:hover {
            background: #21262d;
            border-color: #8b949e;
        }
        .email-item {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .email-item:hover {
            border-color: #00d4aa;
        }
        .email-sender { font-weight: 600; }
        .email-subject { color: #8b949e; font-size: 0.9rem; }
        .email-date { color: #8b949e; font-size: 0.8rem; }
        .otp-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,212,170,0.1);
            border: 1px solid rgba(0,212,170,0.3);
            color: #00d4aa;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .otp-badge:hover {
            background: #00d4aa;
            color: #000;
        }
        .stat-box {
            background: #21262d;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            border: 1px solid #30363d;
        }
        .stat-number { font-size: 2rem; font-weight: 700; color: #00d4aa; }
        .stat-label { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-dot.online { background: #00d4aa; box-shadow: 0 0 8px rgba(0,212,170,0.5); }
        .status-dot.offline { background: #f85149; }
        #loading { display: none; }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        .toast-custom {
            background: #161b22;
            border: 1px solid #30363d;
            color: #e6edf3;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 280px;
        }
        .filter-section {
            background: #21262d;
            border-radius: 10px;
            padding: 16px;
            border: 1px solid #30363d;
            margin-bottom: 16px;
        }
        pre {
            background: #21262d;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            color: #e6edf3;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-shield-lock-fill me-2"></i>
                Gmail OTP Extractor
            </span>
            <span id="statusBadge">
                <span class="status-dot offline"></span>
                <span id="statusText" class="text-secondary" style="font-size:0.85rem;">Memeriksa...</span>
            </span>
        </div>
    </nav>

    <div class="container py-4">
        <!-- STATS -->
        <div class="row mb-4">
            <div class="col-md-3 mb-2">
                <div class="stat-box">
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="stat-label">Total OTP</div>
                </div>
            </div>
            <div class="col-md-3 mb-2">
                <div class="stat-box">
                    <div class="stat-number" id="statEmails">0</div>
                    <div class="stat-label">Email</div>
                </div>
            </div>
            <div class="col-md-3 mb-2">
                <div class="stat-box">
                    <div class="stat-number" id="statUnique">0</div>
                    <div class="stat-label">OTP Unik</div>
                </div>
            </div>
            <div class="col-md-3 mb-2">
                <div class="stat-box">
                    <div class="stat-number" id="statSenders">0</div>
                    <div class="stat-label">Pengirim</div>
                </div>
            </div>
        </div>

        <!-- MAIN CARD -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-search me-2"></i>Cari OTP</span>
                <span id="loading">
                    <span class="spinner-border spinner-border-sm text-success me-1"></span>
                    Memproses...
                </span>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label"><i class="bi bi-clock me-1"></i>Rentang Waktu</label>
                        <select id="hoursBack" class="form-select">
                            <option value="1">1 jam terakhir</option>
                            <option value="6">6 jam terakhir</option>
                            <option value="12">12 jam terakhir</option>
                            <option value="24" selected>24 jam terakhir</option>
                            <option value="48">48 jam terakhir</option>
                            <option value="72">72 jam terakhir</option>
                            <option value="168">7 hari terakhir</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label"><i class="bi bi-person me-1"></i>Filter Pengirim</label>
                        <input type="text" id="senderFilter" class="form-control" placeholder="no-reply@bank.com">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label"><i class="bi bi-key me-1"></i>Filter Kata Kunci</label>
                        <input type="text" id="keywordFilter" class="form-control" placeholder="OTP, kode, verifikasi...">
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col-12 d-flex gap-2 flex-wrap">
                        <button id="btnFetch" class="btn btn-success" onclick="fetchOTP()">
                            <i class="bi bi-lightning-fill me-1"></i> Ambil OTP
                        </button>
                        <button id="btnExport" class="btn btn-outline-secondary" onclick="exportJSON()" disabled>
                            <i class="bi bi-download me-1"></i> Export JSON
                        </button>
                        <button id="btnExportCSV" class="btn btn-outline-secondary" onclick="exportCSV()" disabled>
                            <i class="bi bi-filetype-csv me-1"></i> Export CSV
                        </button>
                        <button class="btn btn-outline-secondary" onclick="clearAll()">
                            <i class="bi bi-trash me-1"></i> Hapus
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- FILTER HASIL -->
        <div class="filter-section d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-funnel text-secondary"></i>
                <input type="text" id="resultFilter" class="form-control form-control-sm" style="width:200px;" placeholder="Cari...">
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="text-secondary" style="font-size:0.85rem;">Hasil: <span id="totalResults">0</span></span>
            </div>
        </div>

        <!-- RESULTS -->
        <div id="resultsContainer">
            <div class="text-center py-5 text-secondary" id="emptyState">
                <i class="bi bi-envelope-open" style="font-size:3rem;"></i>
                <p class="mt-3">Klik "Ambil OTP" untuk mulai mencari</p>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        let allResults = [];

        // Cek status saat halaman dimuat
        document.addEventListener('DOMContentLoaded', checkStatus);
        document.getElementById('resultFilter').addEventListener('input', renderResults);

        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                if (data.configured) {
                    document.querySelector('.status-dot').className = 'status-dot online';
                    document.getElementById('statusText').textContent = 'Siap ✓';
                } else {
                    document.querySelector('.status-dot').className = 'status-dot offline';
                    document.getElementById('statusText').textContent = 'Belum dikonfigurasi';
                }
            } catch(e) {
                document.getElementById('statusText').textContent = 'Error koneksi';
            }
        }

        async function fetchOTP() {
            const btn = document.getElementById('btnFetch');
            btn.disabled = true;
            document.getElementById('loading').style.display = 'inline';
            
            const hoursBack = document.getElementById('hoursBack').value;
            const senderFilter = document.getElementById('senderFilter').value;
            const keywordFilter = document.getElementById('keywordFilter').value;
            
            try {
                const res = await fetch('/api/fetch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        hours_back: parseInt(hoursBack),
                        sender_filter: senderFilter,
                        keyword_filter: keywordFilter
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    allResults = data.results;
                    renderResults();
                    updateStats();
                    
                    if (data.count === 0) {
                        showToast('Tidak ada OTP ditemukan', 'info');
                    } else {
                        showToast(`Ditemukan ${data.count} email dengan OTP!`, 'success');
                    }
                    
                    document.getElementById('btnExport').disabled = false;
                    document.getElementById('btnExportCSV').disabled = false;
                } else {
                    showToast('Error: ' + (data.error || 'Gagal'), 'error');
                }
            } catch(e) {
                showToast('Gagal terhubung ke server', 'error');
            } finally {
                btn.disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderResults() {
            const container = document.getElementById('resultsContainer');
            const empty = document.getElementById('emptyState');
            
            if (allResults.length === 0) {
                empty.style.display = 'block';
                container.innerHTML = '';
                return;
            }
            
            empty.style.display = 'none';
            
            const filterText = document.getElementById('resultFilter').value.toLowerCase();
            let filtered = allResults;
            if (filterText) {
                filtered = allResults.filter(r => 
                    r.otps.some(o => o.includes(filterText)) ||
                    r.sender.toLowerCase().includes(filterText) ||
                    r.subject.toLowerCase().includes(filterText)
                );
            }
            
            document.getElementById('totalResults').textContent = filtered.length;
            
            container.innerHTML = filtered.map(item => {
                const otpBadges = (item.otps || []).map(otp =>
                    `<span class="otp-badge me-2 mb-2" onclick="copyOTP('${otp}', this)">${otp} <i class="bi bi-clipboard" style="font-size:0.8rem;"></i></span>`
                ).join('');
                
                return `
                    <div class="email-item">
                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                            <div>
                                <div class="email-sender"><i class="bi bi-person-circle me-1 text-secondary"></i>${escapeHtml(item.sender)}</div>
                                <div class="email-subject mt-1">${escapeHtml(item.subject)}</div>
                                <div class="email-date mt-1"><i class="bi bi-clock me-1"></i>${item.date || '-'}</div>
                            </div>
                            <div class="text-end">
                                <div class="d-flex flex-wrap justify-content-end">${otpBadges}</div>
                            </div>
                        </div>
                        <div class="mt-2 text-secondary" style="font-size:0.85rem;border-top:1px solid #30363d;padding-top:8px;">
                            ${escapeHtml(item.preview)}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const totalOTP = allResults.reduce((sum, r) => sum + (r.otps?.length || 0), 0);
            const uniqueOTP = new Set(allResults.flatMap(r => r.otps || []));
            const senders = new Set(allResults.map(r => r.sender));
            
            document.getElementById('statTotal').textContent = totalOTP;
            document.getElementById('statEmails').textContent = allResults.length;
            document.getElementById('statUnique').textContent = uniqueOTP.size;
            document.getElementById('statSenders').textContent = senders.size;
        }

        function copyOTP(otp, element) {
            navigator.clipboard.writeText(otp).then(() => {
                const orig = element.innerHTML;
                element.innerHTML = '<i class="bi bi-check-lg"></i> Tersalin!';
                setTimeout(() => element.innerHTML = orig, 1500);
                showToast(`OTP ${otp} tersalin ke clipboard`, 'success');
            });
        }

        function exportJSON() {
            if (allResults.length === 0) return;
            const blob = new Blob([JSON.stringify(allResults, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `otp-export-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Diekspor ke JSON', 'success');
        }

        function exportCSV() {
            if (allResults.length === 0) return;
            let csv = 'Pengirim,Subjek,Tanggal,OTP\n';
            allResults.forEach(r => {
                const otps = (r.otps || []).join('; ');
                csv += `"${r.sender}","${r.subject}","${r.date}","${otps}"\n`;
            });
            const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `otp-export-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Diekspor ke CSV', 'success');
        }

        function clearAll() {
            if (allResults.length === 0) return;
            allResults = [];
            renderResults();
            updateStats();
            document.getElementById('btnExport').disabled = true;
            document.getElementById('btnExportCSV').disabled = true;
            document.getElementById('totalResults').textContent = '0';
            showToast('Hasil dihapus', 'info');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const colors = {success: '#00d4aa', error: '#f85149', info: '#58a6ff'};
            const icons = {success: 'bi-check-circle-fill', error: 'bi-exclamation-circle-fill', info: 'bi-info-circle-fill'};
            
            const toast = document.createElement('div');
            toast.className = 'toast-custom';
            toast.style.borderLeft = `4px solid ${colors[type] || colors.info}`;
            toast.innerHTML = `
                <i class="bi ${icons[type] || icons.info}" style="color:${colors[type] || colors.info};"></i>
                <span style="flex:1;font-size:0.9rem;">${message}</span>
                <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#8b949e;cursor:pointer;">×</button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'opacity 0.5s';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }
    </script>
</body>
</html>
